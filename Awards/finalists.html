<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutch Competitor Series - Award Finalists</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #presentation-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            text-align: center;
        }

        .slide.active {
            opacity: 1;
            pointer-events: all;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        
        h2 {
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .league-logo-large {
            margin-bottom: 20px;
        }

        .league-logo-large img {
            max-height: 180px; 
            width: auto;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
        }

        .slide-league-logo {
            max-height: 70px;
            width: auto;
            margin-right: 20px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }

        .finalists-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: stretch;
            width: 80%;
            max-width: 1200px;
        }

        .finalist-card {
            flex: 1;
            border-radius: 15px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .finalist-card:hover {
            transform: translateY(-10px);
        }

        .team-logo {
            margin-bottom: 20px;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .team-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }

        .player-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Title Screen Logos Container */
        .title-logos-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .title-logos-container img {
            max-height: 120px;
            width: auto;
            filter: drop-shadow(0px 5px 15px rgba(255, 255, 255, 0.1));
            transition: transform 0.3s ease;
        }

        .title-logos-container img:hover {
            transform: scale(1.1);
        }

        #counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1rem;
            color: #666;
        }
    </style>
</head>

        // --- 3. GENERATE THE DATA STRUCTURE ---
        const presentationData = [];

        leaguesInfo.forEach(league => {
            let leagueAwards = [...standardAwards];
            
            // Add Manager of the Year to the START of the list for CCS 
            if (league.id === "CCS") {
                leagueAwards.unshift("Manager of the Year");
            }

            const awardsData = leagueAwards.map(awardName => {
                return {
                    name: awardName,
                    finalists: leagueDataMap[league.id][awardName]
                };
            });

            presentationData.push({
                ...league,
                awards: awardsData
            });
        });

        // --- 4. BUILD THE HTML SLIDES ---
        const container = document.getElementById('presentation-container');
        let slidesHTML = '';

        // Title Screen with all 4 logos (Instructions removed)
        slidesHTML += `
            <div class="slide active">
                <h1>Clutch Competitor Series</h1>
                <h2>Award Finalists</h2>
                
                <div class="title-logos-container">
                    <img src="CCSLogos/CCS.png" alt="CCS Logo" onerror="this.style.display='none';">
                    <img src="CPLLogos/CPL.png" alt="CPL Logo" onerror="this.style.display='none';">
                    <img src="CASLogos/CAS.png" alt="CAS Logo" onerror="this.style.display='none';">

                </div>
            </div>

            // League Title Screen
            slidesHTML += `
                <div class="slide" style="background: radial-gradient(circle, ${league.color} 0%, var(--bg-color) 70%);">
                    <div class="league-logo-large">
                        <img src="${league.logoFolder}/${league.logoFile}" alt="${league.name} Logo" onerror="this.style.display='none';">
                    </div>
                    <h1 style="color: ${league.color}; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">${league.name}</h1>
                    <h2>Awards Finalists</h2>
                </div>
            `;

            // Award Slides
            league.awards.forEach(award => {
                let finalistsHTML = award.finalists.map(f => `
                    <div class="finalist-card" style="background-color: ${f.teamColor};">
                        <div class="team-logo">
                            <img src="${f.teamLogo}" alt="Team Logo" onerror="this.style.display='none';">
                        </div>
                        <div class="player-name">${f.player}</div>
                    </div>
                `).join('');

                slidesHTML += `
                    <div class="slide">
                        <h2 style="color: ${league.color};">
                            <img src="${league.logoFolder}/${league.logoFile}" class="slide-league-logo" alt="${league.name} Logo" onerror="this.style.display='none';">
                            <span style="color:white; margin-right: 15px;">${league.name}</span> ${award.name}
                        </h2>
                        <div class="finalists-grid">
                            ${finalistsHTML}
                        </div>
                    </div>
                `;
            });
        });

        container.innerHTML = slidesHTML;

        // --- 5. NAVIGATION LOGIC ---
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const counter = document.getElementById('counter');

        function updateSlide(newIndex) {
            slides[currentSlideIndex].classList.remove('active');
            
            if (newIndex >= slides.length) currentSlideIndex = 0;
            else if (newIndex < 0) currentSlideIndex = slides.length - 1;
            else currentSlideIndex = newIndex;

            slides[currentSlideIndex].classList.add('active');
            counter.innerText = `${currentSlideIndex + 1} / ${slides.length}`;
        }

        counter.innerText = `1 / ${slides.length}`;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                updateSlide(currentSlideIndex + 1);
            } else if (e.key === 'ArrowLeft') {
                updateSlide(currentSlideIndex - 1);
            }
        });
    </script>
</body>
</html>
