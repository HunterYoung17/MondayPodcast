<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Countdown</title>
    <style>
        :root {
            --bg-color: #121212; /* Matches directory background */
            --card-bg: #1e1e1e; /* Matches directory cards */
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #00e5ff; /* Matches directory accent */
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .countdown-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
            text-align: center;
            border-top: 6px solid var(--accent);
        }

        .title {
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .timezone {
            color: var(--accent);
            font-weight: bold;
        }

        .clock {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-seg {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 100px;
        }

        .number {
            font-size: 5rem;
            line-height: 1;
            margin: 0;
            font-variant-numeric: tabular-nums; /* Prevents shifting */
        }

        .label {
            text-transform: uppercase;
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* Seperators (:) */
        .separator {
            font-size: 5rem;
            line-height: 1;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="title">Countdown to <span class="timezone">Midnight ET</span></div>
        <div class="clock">
            <div class="time-seg">
                <div class="number" id="hours">00</div>
                <div class="label">Hrs</div>
            </div>
            <div class="separator">:</div>
            <div class="time-seg">
                <div class="number" id="minutes">00</div>
                <div class="label">Mins</div>
            </div>
            <div class="separator">:</div>
            <div class="time-seg">
                <div class="number" id="seconds">00</div>
                <div class="label">Secs</div>
            </div>
        </div>
    </div>

    <script>
        const elHours = document.getElementById('hours');
        const elMinutes = document.getElementById('minutes');
        const elSeconds = document.getElementById('seconds');

        function updateCountdown() {
            // Get current time in local browser
            const now = new Date();

            // Convert current local time to Eastern Time (New York) string
            // This handles EST vs EDT automatically
            const etString = now.toLocaleString("en-US", {timeZone: "America/New_York"});
            const etNow = new Date(etString);

            // Find tomorrow's date based on ET
            const etTomorrow = new Date(etNow);
            etTomorrow.setDate(etNow.getDate() + 1);
            etTomorrow.setHours(0, 0, 0, 0); // Set to 00:00:00

            // Calculate difference in milliseconds
            const diff = etTomorrow - etNow;

            if (diff <= 0) {
                // If the target has passed (rare glitch), show all zeros
                applyTime(0, 0, 0);
                return;
            }

            // Time calculations
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            applyTime(hours, minutes, seconds);
        }

        // Helper to pad numbers and update DOM
        function applyTime(h, m, s) {
            elHours.innerHTML = String(h).padStart(2, '0');
            elMinutes.innerHTML = String(m).padStart(2, '0');
            elSeconds.innerHTML = String(s).padStart(2, '0');
        }

        // Run immediately, then every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
