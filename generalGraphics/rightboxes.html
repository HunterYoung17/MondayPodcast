<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Cams Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        .layout-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .column {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .column.right {
            right: 40px;
        }

        .cam-frame {
            width: 320px;
            height: 180px;
            border: 4px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            background-color: transparent; 
            position: relative; 
            overflow: hidden; 
        }

        /* Nameplate Styling */
        .nameplate {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(119, 81, 31, 0.85); 
            color: #ffffff;
            text-align: center;
            padding: 6px 0;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 2px solid rgba(255, 255, 255, 0.2); 
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <div class="column right">
            <div class="cam-frame">
                <div class="nameplate">Loomeister(C)</div>
            </div>
            <div class="cam-frame">
                <div class="nameplate">Dark</div>
            </div>
            <div class="cam-frame">
                <div class="nameplate">Slykooper</div>
            </div>
        </div>
    </div>

</body>
</html>
